<div class="login-wrapper">
  
  <!-- CONTENEDOR PRINCIPAL LOGIN -->
  <div class="container-fluid p-0 login-container">
    <div class="row g-0 align-items-center justify-content-center min-vh-100">
      
      <!-- TARJETA CON ANCHO FIJO DE 480px -->
      <div class="col-12 d-flex justify-content-center">
        <div class="glass-card animate-fade-in">
          
          <!-- BOTÓN DE REGRESAR (NUEVO) -->
          <a [routerLink]="'/home'" class="btn-back-home">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="19" y1="12" x2="5" y2="12"></line>
              <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
          </a>

          <div class="text-center mb-4">
            <img src="assets/images/logo/5cd86c5269c85bcc6dfd9d97f1e772ee.png" alt="Imperio Global" class="img-fluid mb-3" style="max-height: 50px; filter: brightness(0) invert(1);">
            <h2 class="fw-bold text-white mb-1">Bienvenido de vuelta</h2>
            <p class="text-white-50 mb-0">Accede a tu imperio global</p>
          </div>

          <form nz-form [formGroup]="frmLogin" nzLayout="vertical" class="login-form w-100">
            
            <!-- Campo Email -->
            <nz-form-item class="mb-4">
              <nz-form-control [nzErrorTip]="errorEmail">
                <div class="floating-input-group">
                  <input type="text" nz-input formControlName="email" class="custom-input" placeholder=" ">
                  <label class="floating-label">Correo Electrónico</label>
                </div>
                <ng-template #errorEmail let-control>
                  <span class="text-danger small" *ngIf="control.hasError('required')">Campo obligatorio</span>
                  <span class="text-danger small" *ngIf="control.hasError('email')">Email incorrecto</span>
                </ng-template>
              </nz-form-control>
            </nz-form-item>

            <!-- Campo Password -->
            <nz-form-item class="mb-4">
              <nz-form-control nzErrorTip="Campo obligatorio">
                <div class="floating-input-group">
                  <input [type]="!isViewPassword ? 'password': 'text'" nz-input formControlName="password" class="custom-input" placeholder=" ">
                  <label class="floating-label">Contraseña</label>
                  <span class="password-toggle" (click)="onViewPassword(!isViewPassword)">
                    <i nz-icon [nzType]="isViewPassword ? 'eye' : 'eye-invisible'" nzTheme="outline"></i>
                  </span>
                </div>
              </nz-form-control>
              <a [routerLink]="'/auth/recover-password'" class="text-decoration-none text-white-50 small float-end mt-1">¿Olvidaste tu contraseña?</a>
            </nz-form-item>

            <!-- Botón Ingresar -->
            <button nz-button class="btn-gradient-primary w-100 border-0 py-3 rounded-pill fw-bold fs-6 mt-3" (click)="onSubmit()">
              Ingresar a mi cuenta
            </button>

          </form>

          <div class="text-center mt-4">
            <span class="text-white-50 small">¿Aún no tienes cuenta? </span>
            <a [routerLink]="'/auth/register'" class="text-warning fw-bold text-decoration-none">Crea tu cuenta aquí</a>
          </div>

        </div>
      </div>
    </div>
  </div>

  <!-- ============================================ -->
  <!-- MODAL DE CARGA EN EL CENTRO DE LA PANTALLA -->
  <!-- ============================================ -->
  <div class="loading-overlay" *ngIf="loadingSubmit">
    <div class="loading-modal">
      <div class="spinner-border text-primary" role="status" style="width: 4rem; height: 4rem;">
        <span class="visually-hidden">Cargando...</span>
      </div>
      <h5 class="mt-3 text-white fw-bold">Cargando...</h5>
      <p class="text-white-50 small">Por favor espera un momento</p>
    </div>
  </div>

</div>
