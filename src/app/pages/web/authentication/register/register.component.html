<div class="register-wrapper">
  
  <!-- CONTENEDOR PRINCIPAL REGISTRO -->
  <div class="container-fluid p-0 register-container">
    <div class="row g-0 align-items-center justify-content-center min-vh-100">
      
      <!-- TARJETA DE REGISTRO -->
      <div class="col-12 d-flex justify-content-center">
        <div class="glass-card animate-fade-in">
          
          <!-- BOTÓN DE REGRESAR (NUEVO) -->
          <a [routerLink]="'/home'" class="btn-back-home">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="19" y1="12" x2="5" y2="12"></line>
              <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
          </a>

          <div class="text-center mb-4">
            <img src="assets/images/logo/5cd86c5269c85bcc6dfd9d97f1e772ee.png" alt="Imperio Global" class="img-fluid mb-3" style="max-height: 50px; filter: brightness(0) invert(1);">
            <h2 class="fw-bold text-white mb-1">Crea tu cuenta</h2>
            <p class="text-white-50 mb-0">Ingresa tus datos para unirte</p>
          </div>

          <form nz-form [formGroup]="frmRegister" nzLayout="vertical" class="login-form w-100">
            
            <!-- FILA 1: Nombre y Email -->
            <div class="row g-3">
              <div class="col-md-6">
                <nz-form-item class="mb-3">
                  <nz-form-control nzErrorTip="Campo obligatorio.">
                    <div class="floating-input-group">
                      <input type="text" nz-input formControlName="userName" class="custom-input" placeholder=" ">
                      <label class="floating-label">Nombre completo</label>
                    </div>
                  </nz-form-control>
                </nz-form-item>
              </div>
              <div class="col-md-6">
                <nz-form-item class="mb-3">
                  <nz-form-control [nzErrorTip]="errorEmail">
                    <div class="floating-input-group">
                      <input type="text" nz-input formControlName="email" class="custom-input" placeholder=" ">
                      <label class="floating-label">Correo Electrónico</label>
                    </div>
                    <ng-template #errorEmail let-control>
                      <span class="text-danger small" *ngIf="control.hasError('required')">Campo obligatorio</span>
                      <span class="text-danger small" *ngIf="control.hasError('email')">Email incorrecto</span>
                    </ng-template>
                  </nz-form-control>
                </nz-form-item>
              </div>
            </div>

            <!-- FILA 2: DNI y Contraseña -->
            <div class="row g-3">
              <div class="col-md-6">
                <nz-form-item class="mb-3">
                  <nz-form-control nzErrorTip="Campo obligatorio.">
                    <div class="floating-input-group">
                      <input type="text" nz-input formControlName="dni" class="custom-input" placeholder=" ">
                      <label class="floating-label">DNI</label>
                    </div>
                  </nz-form-control>
                </nz-form-item>
              </div>
              <div class="col-md-6">
                <nz-form-item class="mb-3">
                  <nz-form-control [nzErrorTip]="errorPassword">
                    <div class="floating-input-group">
                      <input type="password" nz-input formControlName="password" class="custom-input" placeholder=" ">
                      <label class="floating-label">Contraseña</label>
                    </div>
                    <ng-template #errorPassword let-control>
                      <span class="text-danger small" *ngIf="control.hasError('required')">Campo obligatorio</span>
                      <span class="text-danger small" *ngIf="control.hasError('minlength')">Mínimo 8 caracteres</span>
                    </ng-template>
                  </nz-form-control>
                </nz-form-item>
              </div>
            </div>

            <!-- FILA 3: Confirmar Contraseña -->
            <nz-form-item class="mb-3">
              <nz-form-control nzErrorTip="Campo obligatorio.">
                <div class="floating-input-group">
                  <input type="password" nz-input formControlName="repeatpassword" class="custom-input" placeholder=" ">
                  <label class="floating-label">Confirmar Contraseña</label>
                </div>
              </nz-form-control>
            </nz-form-item>

            <!-- Términos y condiciones -->
            <nz-form-item class="mb-3">
              <nz-form-control>
                <label nz-checkbox formControlName="terms" class="text-white small">
                  <span class="text-white-75">Acepto los <a href="javascript:void(0)" class="text-warning fw-bold text-decoration-none">términos y condiciones</a></span>
                </label>
              </nz-form-control>
            </nz-form-item>

            <!-- Botón Crear cuenta -->
            <button nz-button class="btn-gradient-primary w-100 border-0 py-2 rounded-pill fw-bold fs-6 mt-2" (click)="onSubmit()">
              Crear cuenta
            </button>

          </form>

          <div class="text-center mt-3">
            <span class="text-white-50 small">¿Ya tienes una cuenta? </span>
            <a [routerLink]="'/auth/login'" class="text-warning fw-bold text-decoration-none">Inicia sesión aquí</a>
          </div>

        </div>
      </div>
    </div>
  </div>

  <!-- MODAL DE CARGA -->
  <div class="loading-overlay" *ngIf="loadingSubmit">
    <div class="loading-modal">
      <div class="spinner-border text-primary" role="status" style="width: 4rem; height: 4rem;">
        <span class="visually-hidden">Cargando...</span>
      </div>
      <h5 class="mt-3 text-white fw-bold">Creando tu cuenta...</h5>
      <p class="text-white-50 small">Por favor espera un momento</p>
    </div>
  </div>

</div>
