<div class="recover-wrapper">
  
  <!-- CONTENEDOR PRINCIPAL RECUPERAR CONTRASEÑA -->
  <div class="container-fluid p-0 recover-container">
    <div class="row g-0 align-items-center justify-content-center min-vh-100">
      
      <!-- TARJETA DE RECUPERACIÓN -->
      <div class="col-12 d-flex justify-content-center">
        <div class="glass-card animate-fade-in">
          
          <!-- BOTÓN DE REGRESAR (NUEVO) -->
          <a [routerLink]="'/auth/login'" class="btn-back-home">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="19" y1="12" x2="5" y2="12"></line>
              <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
          </a>

          <div class="text-center mb-4">
            <img src="assets/images/logo/5cd86c5269c85bcc6dfd9d97f1e772ee.png" alt="Imperio Global" class="img-fluid mb-3" style="max-height: 50px; filter: brightness(0) invert(1);">
            <h2 class="fw-bold text-white mb-1">Recupera tu contraseña</h2>
            <p class="text-white-50 mb-0">Ingresa tu correo registrado</p>
          </div>

          <form nz-form [formGroup]="frmRecoverPassword" nzLayout="vertical" class="login-form w-100">
            
            <!-- Campo Email -->
            <nz-form-item class="mb-4">
              <nz-form-control>
                <div class="floating-input-group">
                  <input type="text" nz-input formControlName="email" class="custom-input" placeholder=" ">
                  <label class="floating-label">Correo Electrónico</label>
                </div>
              </nz-form-control>
            </nz-form-item>

            <!-- Botón Confirmar -->
            <button nz-button class="btn-gradient-primary w-100 border-0 py-3 rounded-pill fw-bold fs-6 mt-3" (click)="onSubmit()" [nzLoading]="loadingSubmit">
              Confirmar
            </button>

          </form>

          <!-- Mensaje de Error Integrado -->
          <div class="mt-3" *ngIf="showError">
            <div class="error-glass-box">
              <i nz-icon nzType="close-circle" nzTheme="fill" class="text-danger me-2" style="font-size: 20px;"></i>
              <span class="text-white small fw-bold">{{ textError }}</span>
            </div>
          </div>

          <div class="text-center mt-3">
            <span class="text-white-50 small">¿Recordaste tu contraseña? </span>
            <a [routerLink]="'/auth/login'" class="text-warning fw-bold text-decoration-none">Inicia sesión aquí</a>
          </div>

        </div>
      </div>
    </div>
  </div>

  <!-- ============================================ -->
  <!-- MODAL DE CARGA EN EL CENTRO DE LA PANTALLA -->
  <!-- ============================================ -->
  <div class="loading-overlay" *ngIf="loadingSubmit">
    <div class="loading-modal">
      <div class="spinner-border text-primary" role="status" style="width: 4rem; height: 4rem;">
        <span class="visually-hidden">Cargando...</span>
      </div>
      <h5 class="mt-3 text-white fw-bold">Enviando correo...</h5>
      <p class="text-white-50 small">Por favor espera un momento</p>
    </div>
  </div>

</div>
